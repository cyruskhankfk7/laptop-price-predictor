<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Price Predictor</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            margin: 0; padding: 0;
            background: url('https://images.unsplash.com/photo-1498050108023-c5249f4df085?ixlib=rb-4.0.3&auto=format&fit=crop&w=2072&q=80') no-repeat center center fixed;
            background-size: cover;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 30px 40px; width: 100%; max-width: 850px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.5);
            color: #fff;
        }
        h2 { text-align: center; margin-bottom: 25px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: 600; font-size: 13px; text-shadow: 1px 1px 2px rgba(0,0,0,0.4); }
        input, select {
            padding: 10px; border: none; border-radius: 8px;
            background: rgba(255, 255, 255, 0.9); font-size: 14px; color: #333;
        }
        input:focus, select:focus { outline: 2px solid #4facfe; }
        .btn-submit {
            grid-column: span 3; padding: 12px; margin-top: 10px;
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            border: none; border-radius: 8px; color: white; font-size: 18px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-submit:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(0,242,254,0.4); }
        .result {
            grid-column: span 3; text-align: center; margin-top: 15px;
            font-size: 22px; font-weight: bold; color: #00ff88; text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr 1fr; }
            .btn-submit, .result { grid-column: span 2; }
        }
        @media (max-width: 480px) {
            .form-grid { grid-template-columns: 1fr; }
            .btn-submit, .result { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>💻 Laptop Price Predictor</h2>
    <form action="/predict" method="post" class="form-grid">

        <div class="form-group">
            <label>Brand</label>
            <select name="company" required>
                <option value="Apple">Apple</option>
                <option value="HP">HP</option>
                <option value="Acer">Acer</option>
                <option value="Asus">Asus</option>
                <option value="Dell">Dell</option>
                <option value="Lenovo">Lenovo</option>
                <option value="MSI">MSI</option>
                <option value="Toshiba">Toshiba</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Type</label>
            <select name="typename" required>
                <option value="Ultrabook">Ultrabook</option>
                <option value="Notebook">Notebook</option>
                <option value="Netbook">Netbook</option>
                <option value="Gaming">Gaming</option>
                <option value="2 in 1 Convertible">2 in 1 Convertible</option>
                <option value="Workstation">Workstation</option>
            </select>
        </div>

        <div class="form-group">
            <label>RAM (in GB)</label>
            <select name="ram" required>
                <option value="2">2</option>
                <option value="4">4</option>
                <option value="6">6</option>
                <option value="8" selected>8</option>
                <option value="12">12</option>
                <option value="16">16</option>
                <option value="24">24</option>
                <option value="32">32</option>
                <option value="64">64</option>
            </select>
        </div>

        <div class="form-group">
            <label>Weight (in kg)</label>
            <input type="number" step="0.01" name="weight" placeholder="e.g. 1.5" required>
        </div>

        <div class="form-group">
            <label>Touchscreen</label>
            <select name="touchscreen" required>
                <option value="No">No</option>
                <option value="Yes">Yes</option>
            </select>
        </div>

        <div class="form-group">
            <label>IPS Display</label>
            <select name="ips" required>
                <option value="No">No</option>
                <option value="Yes">Yes</option>
            </select>
        </div>

        <div class="form-group">
            <label>PPI (Pixels Per Inch)</label>
            <input type="number" step="0.01" name="ppi" placeholder="e.g. 141.21" required>
        </div>

        <div class="form-group">
            <label>CPU Brand</label>
            <select name="cpu" required>
                <option value="Intel Core i5">Intel Core i5</option>
                <option value="Intel Core i7">Intel Core i7</option>
                <option value="Intel Core i3">Intel Core i3</option>
                <option value="Other Intel Processor">Other Intel Processor</option>
                <option value="AMD Processor">AMD Processor</option>
            </select>
        </div>

        <div class="form-group">
            <label>HDD (in GB)</label>
            <select name="hdd" required>
                <option value="0">0</option>
                <option value="128">128</option>
                <option value="256">256</option>
                <option value="512">512</option>
                <option value="1024">1024</option>
                <option value="2048">2048</option>
            </select>
        </div>

        <div class="form-group">
            <label>SSD (in GB)</label>
            <select name="ssd" required>
                <option value="0">0</option>
                <option value="8">8</option>
                <option value="128">128</option>
                <option value="256" selected>256</option>
                <option value="512">512</option>
                <option value="1024">1024</option>
            </select>
        </div>

        <div class="form-group">
            <label>GPU Brand</label>
            <select name="gpu" required>
                <option value="Intel">Intel</option>
                <option value="AMD">AMD</option>
                <option value="Nvidia">Nvidia</option>
            </select>
        </div>

        <div class="form-group">
            <label>Operating System</label>
            <select name="os" required>
                <option value="Windows">Windows</option>
                <option value="Mac">Mac</option>
                <option value="Others/No OS/Linux">Others/No OS/Linux</option>
            </select>
        </div>

        <button type="submit" class="btn-submit">Predict Price</button>

        {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
        {% endif %}
    </form>
</div>

</body>
</html>
